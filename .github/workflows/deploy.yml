name: Cloud-Build & Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Application
        # Use GITHUB_SHA for internal BUILD_ID consistency; set stable encryption for actions
        run: |
          export BUILD_ID=${{ github.sha }}
          export NEXT_SERVER_ACTIONS_ENCRYPTION_KEY=${{ secrets.ACTIONS_ENCRYPTION_KEY || 'agendamaster-stable-key-32chars' }}
          npm run build

      - name: Copy Files to Droplet
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: ".next,public,node_modules,package.json,ecosystem.config.js,prisma"
          target: "/var/www/agendamaster"

      - name: PM2 Reload
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: ${{ secrets.DROPLET_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Load the NVM/Node Environment
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # 2. Navigate and Sync Database
            cd /var/www/agendamaster
            export DATABASE_URL="file:/var/www/data/prod.db"
            npx prisma db push --url="$DATABASE_URL"
            npx tsx prisma/seed.ts
            
            # 3. Reload PM2
            pm2 reload ecosystem.config.js || pm2 start ecosystem.config.js
